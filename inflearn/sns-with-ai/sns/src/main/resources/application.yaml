spring:
  application:
    name: sns
  datasource:
    url: "jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:sns}"
    username: "${POSTGRES_USER:sns}"
    password: "${POSTGRES_PASSWORD:sns}"
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"
  session:
    store-type: redis
rustfs:
  endpoint: "${RUSTFS_ENDPOINT:http://localhost:9000}"
  access-key: "${RUSTFS_ACCESS_KEY:rustfsadmin}"
  secret-key: "${RUSTFS_SECRET_KEY:rustfsadmin}"
  bucket: "${RUSTFS_BUCKET:media}"
  region: "${RUSTFS_REGION:ap-northeast-2}"
  presigned-url-expiration-seconds: "${RUSTFS_PRESIGNED_URL_EXPIRATION_SECONDS:3600}"
